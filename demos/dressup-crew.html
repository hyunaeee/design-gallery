<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y2K CLOSET — 드래그 옷입히기 스튜디오</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

/* Y2K 드래그 옷입히기 — 하나의 실루엣에서 파생한 5인(피부톤 변형) 패션돌.
   선택한 인형이 중앙에 크게 서고, 나머지는 하단에 '입은 채로' 대기한다.
   옷장에서 아이템을 끌어 인형 위에 놓으면 '놓은 자리에 그대로' 착용(자유 배치),
   입은 아이템은 다시 끌어 위치를 옮기거나 밖으로 끌어 벗기고, 휠로 크기를 조절한다.
   모든 인형·아이템은 AI(Higgsfield) 생성 후 배경 제거한 투명 PNG, 배경은 일러스트 5종. */
*{ margin:0; padding:0; box-sizing:border-box; }
:root{
  --ink:#3a2f45; --dim:#9b8aa8; --line:#efe3f2; --panel:#fff;
  --pink:#ff6fb0; --lav:#a98cff; --mint:#5fd4c4; --sun:#ffc93c;
}
html,body{ height:100%; }
body{ font-family:'Fredoka','Noto Sans KR',sans-serif; background:#fdf4fb; color:var(--ink);
  overflow:hidden; -webkit-font-smoothing:antialiased; user-select:none; }
.app{ height:100vh; display:grid; grid-template-rows:auto 1fr; }

/* ── 헤더 ── */
header{ display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:11px min(2.6vw,20px); background:var(--panel); border-bottom:2px dashed var(--line); z-index:30; }
.logo{ font-weight:700; font-size:clamp(15px,2vw,20px); letter-spacing:.01em; }
.logo b{ color:var(--pink); } .logo i{ font-style:normal; color:var(--lav); }
.hbtns{ display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.btn{ font-family:inherit; font-weight:600; font-size:12.5px; border:none; border-radius:20px;
  padding:9px 14px; cursor:pointer; color:#fff; transition:transform .12s, filter .2s; }
.btn:active{ transform:scale(.94); } .btn:hover{ filter:brightness(1.06); }
.btn.p{ background:var(--pink); box-shadow:0 3px 0 #d94f8c; }
.btn.l{ background:var(--lav); box-shadow:0 3px 0 #7f66d1; }
.btn.g{ background:#fff; color:var(--ink); border:2px solid var(--line); }
.lang{ font-family:inherit; font-weight:700; font-size:11px; background:#fff; color:var(--dim);
  border:2px solid var(--line); border-radius:18px; padding:7px 11px; cursor:pointer; }

/* ── 본체 ── */
.main{ display:grid; grid-template-columns:1fr 292px; overflow:hidden; }
@media(max-width:840px){ .main{ grid-template-columns:1fr 200px; } }

/* 무대 */
.stagewrap{ position:relative; display:grid; grid-template-rows:1fr auto; overflow:hidden; }
.stage{ position:relative; overflow:hidden; display:grid; place-items:end center; }
.stage .bgimg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  transition:opacity .45s; }
.stage::after{ content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 30%, rgba(0,0,0,.10)); }

/* 중앙 인형(선택된 1명, 크게) */
.dollbox{ position:relative; z-index:3; height:min(78vh,calc(100% - 20px)); aspect-ratio:3/4;
  margin-bottom:6px; }
.dollbox img{ position:absolute; -webkit-user-drag:none; }
.dollbox .base{ left:0; top:0; width:100%; height:100%; object-fit:contain;
  filter:drop-shadow(0 14px 14px rgba(0,0,0,.28)); }
.dollbox .swapfx{ animation:swapin .4s cubic-bezier(.2,.9,.3,1.3); }
@keyframes swapin{ 0%{ opacity:0; transform:translateY(14px) scale(.94);} 100%{ opacity:1; transform:none;} }
/* 착용 아이템(슬롯 위치는 JS의 POS가 지정) */
.dollbox .worn{ position:absolute; cursor:grab; filter:drop-shadow(0 4px 6px rgba(0,0,0,.18)); }
.dollbox .worn:active{ cursor:grabbing; }
/* 드롭 하이라이트 */
.dollbox .hint{ position:absolute; inset:-3%; border-radius:26px; opacity:0; transition:opacity .18s;
  border:3px dashed var(--pink); background:rgba(255,111,176,.10); pointer-events:none; }
.dollbox.armed .hint{ opacity:1; }

/* 하단 대기 줄(나머지 4명, 입은 채로) */
.bench{ position:relative; z-index:4; display:flex; align-items:flex-end; justify-content:center;
  gap:clamp(8px,2vw,22px); padding:10px 12px 12px; background:rgba(255,255,255,.78);
  backdrop-filter:blur(8px); border-top:2px dashed var(--line); }
.mini{ position:relative; width:clamp(52px,6.4vw,76px); aspect-ratio:3/4; cursor:pointer;
  transition:transform .18s; }
.mini:hover{ transform:translateY(-6px); }
.mini img{ position:absolute; pointer-events:none; -webkit-user-drag:none; }
.mini .base{ left:0; top:0; width:100%; height:100%; object-fit:contain; }
.mini.sel{ transform:translateY(-6px); }
.mini.sel::after{ content:""; position:absolute; left:12%; right:12%; bottom:-7px; height:4px;
  border-radius:99px; background:var(--pink); }
.mini .nm{ position:absolute; left:50%; bottom:-24px; transform:translateX(-50%);
  font-size:10px; font-weight:600; color:var(--dim); white-space:nowrap; }
.bench{ padding-bottom:26px; }
.mini.sel .nm{ color:var(--pink); }

/* ── 옷장 ── */
.closet{ background:var(--panel); border-left:2px dashed var(--line);
  display:grid; grid-template-rows:auto auto 1fr auto; overflow:hidden; }
.closet h3{ padding:12px 14px 4px; font-size:13.5px; font-weight:700; }
.closet h3 span{ color:var(--dim); font-weight:500; font-size:11px; }
.cats{ display:flex; gap:5px; padding:8px 12px 10px; flex-wrap:wrap; }
.cat{ font-family:inherit; font-weight:600; font-size:11.5px; border:2px solid var(--line);
  background:#fff; color:var(--dim); border-radius:16px; padding:5px 10px; cursor:pointer; transition:.2s; }
.cat.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
.rack{ overflow-y:auto; padding:0 12px 12px; display:grid;
  grid-template-columns:repeat(2,1fr); gap:9px; align-content:start; }
.chip{ position:relative; aspect-ratio:1; border:2px solid var(--line); border-radius:16px;
  background:#fefaff; display:grid; place-items:center; cursor:grab;
  transition:transform .12s, border-color .2s, box-shadow .2s; }
.chip:hover{ transform:translateY(-3px); border-color:var(--pink);
  box-shadow:0 6px 14px rgba(255,111,176,.18); }
.chip:active{ cursor:grabbing; }
.chip img{ width:80%; height:74%; object-fit:contain; pointer-events:none; -webkit-user-drag:none; }
.chip.bgchip img{ width:88%; height:78%; object-fit:cover; border-radius:10px; }
.chip .nm{ position:absolute; left:2px; right:2px; bottom:3px; text-align:center;
  font-size:9.5px; font-weight:600; color:var(--dim); }
.chip.on{ border-color:var(--pink); background:#fff2f8; }
.hintbar{ padding:8px 13px 10px; font-size:10.5px; line-height:1.5; color:var(--dim);
  border-top:1px dashed var(--line); }

/* 드래그 고스트 — 실제 착용될 크기 그대로(WYSIWYG), 놓은 자리에 그대로 입는다 */
.ghost{ position:fixed; z-index:99; pointer-events:none; transform:translate(-50%,-50%);
  filter:drop-shadow(0 10px 16px rgba(0,0,0,.28)); }
.ghost img{ display:block; width:100%; height:auto; }

.toast{ position:fixed; left:50%; bottom:110px; transform:translate(-50%,10px); z-index:60;
  background:var(--ink); color:#fff; font-weight:600; font-size:13px; padding:11px 20px;
  border-radius:22px; opacity:0; pointer-events:none; transition:.28s; }
.toast.on{ opacity:1; transform:translate(-50%,0); }
body.anim-paused *{ animation-play-state:paused !important; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo"><b>Y2K</b> <i>CLOSET</i> · <span data-i18n>스타 스타일리스트</span></div>
    <div class="hbtns">
      <button class="btn l" id="randomBtn" data-i18n>🎲 랜덤 코디</button>
      <button class="btn p" id="shotBtn" data-i18n>📸 화보 촬영</button>
      <button class="btn g" id="resetBtn" data-i18n>↺ 벗기기</button>
      <button class="lang" id="lang">EN</button>
    </div>
  </header>

  <div class="main">
    <div class="stagewrap">
      <div class="stage" id="stage">
        <img class="bgimg" id="bgimg" src="../assets/gen/y2-bg-bedroom.jpg" alt="">
        <div class="dollbox" id="dollbox">
          <div class="hint"></div>
          <img class="base" id="dollBase" src="../assets/gen/y2-doll-1.png" alt="doll">
        </div>
      </div>
      <div class="bench" id="bench"></div>
    </div>

    <aside class="closet">
      <h3 data-i18n>옷장 <span>· 끌어서 입히기</span></h3>
      <div class="cats" id="cats"></div>
      <div class="rack" id="rack"></div>
      <div class="hintbar" data-i18n>아이템을 끌어 원하는 자리에 놓으면 그 자리에 입어요. 입은 아이템은 끌어서 옮기고, 밖으로 끌면 벗고, 휠을 굴리면 크기 조절! 아래 친구를 누르면 교체.</div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ── 데이터 ── */
var DOLLS=[
  { id:1, ko:'하니', en:'Hani' },
  { id:2, ko:'루아', en:'Rua' },
  { id:3, ko:'제니스', en:'Zenith' },
  { id:4, ko:'미오', en:'Mio' },
  { id:5, ko:'설', en:'Seol' }
];
/* slot: hair | top | bot | shoe | acc  /  pos: 인형 박스 기준 % (left, top, width) */
var ITEMS=[
  { id:'hair-blonde',   slot:'hair', ko:'블론드 롱',    en:'Blonde long',   pos:{l:32,t:-3.5,w:36} },
  { id:'hair-buns',     slot:'hair', ko:'스페이스 번',  en:'Space buns',    pos:{l:34,t:-4.5,w:32} },
  { id:'hair-pinkbob',  slot:'hair', ko:'핑크 밥',      en:'Pink bob',      pos:{l:34,t:-3.5,w:32} },
  { id:'hair-twintails',slot:'hair', ko:'트윈테일',     en:'Twin tails',    pos:{l:29,t:-3.5,w:42} },
  { id:'hair-shag',     slot:'hair', ko:'카퍼 샤기',    en:'Copper shag',   pos:{l:32,t:-3.5,w:36} },
  { id:'top-cami',      slot:'top',  ko:'하트 캐미',    en:'Heart cami',    pos:{l:36,t:17.5,w:28} },
  { id:'top-hoodie',    slot:'top',  ko:'벨루어 후디',  en:'Velour hoodie', pos:{l:29,t:18,w:42} },
  { id:'top-babytee',   slot:'top',  ko:'버터플라이 티',en:'Butterfly tee', pos:{l:32,t:18.5,w:36} },
  { id:'top-denim',     slot:'top',  ko:'데님 자켓',    en:'Denim jacket',  pos:{l:29,t:18,w:42} },
  { id:'top-halter',    slot:'top',  ko:'홀터 탑',      en:'Halter top',    pos:{l:35,t:18,w:30} },
  { id:'bot-jeans',     slot:'bot',  ko:'로라이즈 진',  en:'Low-rise jeans',pos:{l:31,t:40,w:38} },
  { id:'bot-mini',      slot:'bot',  ko:'플리츠 미니',  en:'Pleated mini',  pos:{l:33,t:40.5,w:34} },
  { id:'bot-cargo',     slot:'bot',  ko:'카고 스커트',  en:'Cargo skirt',   pos:{l:31,t:40,w:38} },
  { id:'bot-track',     slot:'bot',  ko:'트랙 팬츠',    en:'Track pants',   pos:{l:31,t:40,w:38} },
  { id:'shoe-sneaker',  slot:'shoe', ko:'플랫폼 스니커즈', en:'Platform kicks', pos:{l:38,t:88,w:24} },
  { id:'shoe-boots',    slot:'shoe', ko:'플랫폼 부츠',  en:'Platform boots',pos:{l:38,t:87,w:24} },
  { id:'shoe-jelly',    slot:'shoe', ko:'젤리 샌들',    en:'Jelly sandals', pos:{l:38,t:89,w:24} },
  { id:'acc-shades',    slot:'acc',  ko:'틴트 선글라스',en:'Tinted shades', pos:{l:42,t:8.5,w:16} },
  { id:'acc-chain',     slot:'acc',  ko:'체인 목걸이',  en:'Chunky chain',  pos:{l:42,t:14.5,w:16} },
  { id:'acc-bag',       slot:'acc',  ko:'바게트 백',    en:'Baguette bag',  pos:{l:62,t:36,w:20} },
  { id:'acc-bucket',    slot:'acc',  ko:'퍼지 버킷햇',  en:'Fuzzy bucket',  pos:{l:36,t:-2,w:28} }
];
var BGS=[
  { id:'bedroom',  ko:'Y2K 침실',   en:'Y2K bedroom' },
  { id:'purikura', ko:'스티커 부스',en:'Purikura' },
  { id:'mall',     ko:'쇼핑몰',     en:'Mall' },
  { id:'rooftop',  ko:'노을 옥상',  en:'Rooftop' },
  { id:'neon',     ko:'네온 거리',  en:'Neon street' }
];
var CATS=[
  { id:'hair', ko:'헤어', en:'Hair' },
  { id:'top',  ko:'상의', en:'Tops' },
  { id:'bot',  ko:'하의', en:'Bottoms' },
  { id:'shoe', ko:'신발', en:'Shoes' },
  { id:'acc',  ko:'액세서리', en:'Acc' },
  { id:'bg',   ko:'배경', en:'BG' }
];
function itemById(id){ for(var i=0;i<ITEMS.length;i++) if(ITEMS[i].id===id) return ITEMS[i]; return null; }

/* ── 상태 ──
   자유 배치: worn[i]는 {id,slot,l,t,w} 배열. 좌표는 사용자가 놓은 자리 그대로(인형 박스 % 기준).
   같은 슬롯은 한 벌만(액세서리는 여러 개 중첩 가능), ITEMS의 pos는 랜덤/초기 코디용 기본값. */
var worn=DOLLS.map(function(){ return []; });
var sel=0, cat='hair', bg='bedroom';
function wornEntry(i,id){ for(var k=0;k<worn[i].length;k++) if(worn[i][k].id===id) return worn[i][k]; return null; }
function wearAt(i, it, l, t, w){
  if(it.slot!=='acc') worn[i]=worn[i].filter(function(e){ return e.slot!==it.slot; });
  else worn[i]=worn[i].filter(function(e){ return e.id!==it.id; });
  worn[i].push({ id:it.id, slot:it.slot, l:l, t:t, w:w });
}
function wearDefault(i, it){ wearAt(i, it, it.pos.l, it.pos.t, it.pos.w); }

/* ── 인형 렌더(중앙/미니 공용) ── */
var ORDER=['shoe','bot','top','hair','acc'];   /* 뒤→앞 */
function renderInto(container, dollIdx, big){
  container.querySelectorAll('.worn,.witem').forEach(function(n){ n.remove(); });
  var baseImg=container.querySelector('.base');
  baseImg.src='../assets/gen/y2-doll-'+DOLLS[dollIdx].id+'.png';
  ORDER.forEach(function(slot){
    worn[dollIdx].forEach(function(en,idx){
      if(en.slot!==slot) return;
      var img=document.createElement('img');
      img.className= big ? 'worn' : 'witem';
      img.src='../assets/gen/y2-'+en.id+'.png';
      img.style.left=en.l+'%';
      img.style.top=en.t+'%';
      img.style.width=en.w+'%';
      if(big){ img.dataset.idx=idx; img.dataset.item=en.id; }
      else{ img.style.position='absolute'; img.style.pointerEvents='none'; }
      container.appendChild(img);
    });
  });
}
var dollbox=document.getElementById('dollbox');
function renderMain(fx){
  renderInto(dollbox, sel, true);
  if(fx){ var b=dollbox.querySelector('.base'); b.classList.remove('swapfx'); void b.offsetWidth; b.classList.add('swapfx'); }
}
function renderBench(){
  var bench=document.getElementById('bench'); bench.innerHTML='';
  DOLLS.forEach(function(d,i){
    var m=document.createElement('div');
    m.className='mini'+(i===sel?' sel':''); m.dataset.i=i;
    m.innerHTML='<img class="base" src="../assets/gen/y2-doll-'+d.id+'.png">'+
      '<div class="nm">'+(EN?d.en:d.ko)+'</div>';
    bench.appendChild(m);
    renderInto(m, i, false);
  });
}
document.getElementById('bench').addEventListener('click', function(e){
  var m=e.target.closest('.mini'); if(!m) return;
  sel=+m.dataset.i; renderMain(true); renderBench(); renderRack();
});

/* ── 옷장 ── */
function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(function(c){
    return '<button class="cat'+(cat===c.id?' on':'')+'" data-c="'+c.id+'">'+(EN?c.en:c.ko)+'</button>';
  }).join('');
}
function renderRack(){
  var rack=document.getElementById('rack');
  if(cat==='bg'){
    rack.innerHTML=BGS.map(function(b){
      return '<div class="chip bgchip'+(bg===b.id?' on':'')+'" data-bg="'+b.id+'">'+
        '<img src="../assets/gen/y2-bg-'+b.id+'.jpg"><div class="nm">'+(EN?b.en:b.ko)+'</div></div>';
    }).join('');
    return;
  }
  rack.innerHTML=ITEMS.filter(function(i){ return i.slot===cat; }).map(function(it){
    var on = !!wornEntry(sel, it.id);
    return '<div class="chip'+(on?' on':'')+'" data-item="'+it.id+'">'+
      '<img src="../assets/gen/y2-'+it.id+'.png"><div class="nm">'+(EN?it.en:it.ko)+'</div></div>';
  }).join('');
}
document.getElementById('cats').addEventListener('click', function(e){
  var b=e.target.closest('.cat'); if(!b) return; cat=b.dataset.c; renderCats(); renderRack();
});
document.getElementById('rack').addEventListener('click', function(e){
  var bgc=e.target.closest('[data-bg]');
  if(bgc){ bg=bgc.dataset.bg; document.getElementById('bgimg').src='../assets/gen/y2-bg-'+bg+'.jpg'; renderRack(); }
});

/* ── 드래그 착용/이동/해제 (자유 배치) ──
   고스트는 인형 위에 실제로 입혀질 크기 그대로 렌더되고, 놓은 자리 % 좌표를 그대로 저장한다.
   드래그 중(또는 입은 아이템 위에서) 휠을 굴리면 크기 조절. */
var drag=null, ghost=null;
function boxRect(){ return dollbox.getBoundingClientRect(); }
function makeGhost(id, wPct){
  ghost=document.createElement('div'); ghost.className='ghost';
  ghost.innerHTML='<img src="../assets/gen/y2-'+id+'.png">';
  document.body.appendChild(ghost);
  sizeGhost(wPct);
}
function sizeGhost(wPct){ if(ghost) ghost.style.width=(boxRect().width*wPct/100)+'px'; }
function moveGhost(x,y){ if(ghost){ ghost.style.left=x+'px'; ghost.style.top=y+'px'; } }
function killGhost(){ if(ghost){ ghost.remove(); ghost=null; } }
function overDoll(x,y){
  var r=boxRect();
  return x>=r.left-30 && x<=r.right+30 && y>=r.top-30 && y<=r.bottom+30;
}
/* 옷장에서 집기 */
document.getElementById('rack').addEventListener('pointerdown', function(e){
  var c=e.target.closest('.chip[data-item]'); if(!c) return;
  e.preventDefault();
  var it=itemById(c.dataset.item);
  drag={ it:it, w:it.pos.w, from:null };
  makeGhost(it.id, drag.w); moveGhost(e.clientX,e.clientY);
});
/* 인형 위 아이템: 다시 집어 위치 이동 or 밖으로 끌어 벗기기 */
dollbox.addEventListener('pointerdown', function(e){
  var w=e.target.closest('.worn'); if(!w) return;
  e.preventDefault();
  var en=worn[sel][+w.dataset.idx]; if(!en) return;
  drag={ it:itemById(en.id), w:en.w, from:sel };
  worn[sel].splice(+w.dataset.idx,1);
  renderMain(false); renderBench();
  makeGhost(en.id, drag.w); moveGhost(e.clientX,e.clientY);
});
addEventListener('pointermove', function(e){
  if(!drag) return;
  moveGhost(e.clientX,e.clientY);
  dollbox.classList.toggle('armed', overDoll(e.clientX,e.clientY));
});
addEventListener('pointerup', function(e){
  if(!drag) return;
  if(overDoll(e.clientX,e.clientY)){
    var r=boxRect(), g=ghost.getBoundingClientRect();
    wearAt(sel, drag.it,
      (g.left-r.left)/r.width*100,
      (g.top -r.top )/r.height*100,
      drag.w);
    renderMain(false); renderBench(); renderRack();
  } else if(drag.from!=null){
    toast(EN?'Took it off':'벗었어요');
    renderRack();
  }
  dollbox.classList.remove('armed');
  killGhost(); drag=null;
});
/* 휠 크기 조절: 드래그 중엔 고스트를, 아니면 마우스 아래 입은 아이템을 키우고 줄인다 */
addEventListener('wheel', function(e){
  var dir = e.deltaY<0 ? 1 : -1;
  if(drag){
    e.preventDefault();
    drag.w=Math.max(6, Math.min(90, drag.w*(1+dir*0.07)));
    sizeGhost(drag.w);
    return;
  }
  var w=e.target.closest ? e.target.closest('.worn') : null;
  if(!w) return;
  e.preventDefault();
  var en=worn[sel][+w.dataset.idx]; if(!en) return;
  var nw=Math.max(6, Math.min(90, en.w*(1+dir*0.07)));
  var r=boxRect(), er=w.getBoundingClientRect();
  var hPct=er.height/r.height*100;           /* 현재 렌더 높이(%) 기준으로 중심 유지 */
  en.l += (en.w-nw)/2;
  en.t += hPct*(1-nw/en.w)/2;
  en.w  = nw;
  renderMain(false); renderBench();
}, { passive:false });

/* ── 버튼 ── */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
document.getElementById('randomBtn').addEventListener('click', function(){
  var bySlot={}; ['hair','top','bot','shoe','acc'].forEach(function(s){
    bySlot[s]=ITEMS.filter(function(i){return i.slot===s;});
  });
  worn=DOLLS.map(function(_,i){
    worn[i]=[];
    wearDefault(i, pick(bySlot.hair)); wearDefault(i, pick(bySlot.top));
    wearDefault(i, pick(bySlot.bot));  wearDefault(i, pick(bySlot.shoe));
    if(Math.random()<.6) wearDefault(i, pick(bySlot.acc));
    return worn[i];
  });
  bg=pick(BGS).id;
  document.getElementById('bgimg').src='../assets/gen/y2-bg-'+bg+'.jpg';
  renderMain(true); renderBench(); renderRack();
  toast(EN?'Random fits for everyone! 🎲':'모두 랜덤 코디 완성! 🎲');
});
document.getElementById('resetBtn').addEventListener('click', function(){
  worn[sel]=[];
  renderMain(true); renderBench(); renderRack();
  toast(EN?'Undressed':'다 벗었어요');
});
document.getElementById('shotBtn').addEventListener('click', function(){
  var st=document.getElementById('stage');
  st.animate([{filter:'brightness(1)'},{filter:'brightness(2.2)'},{filter:'brightness(1)'}],{duration:420});
  toast(EN?'📸 Gorgeous!':'📸 완벽한 화보!');
});

var tT=null;
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('on');
  clearTimeout(tT); tT=setTimeout(function(){ t.classList.remove('on'); },1900); }

setInterval(function(){ var p=!!window.__paused;
  if(p!==document.body.classList.contains('anim-paused')) document.body.classList.toggle('anim-paused',p);
},450);

    'Drop an item exactly where you want it. Drag worn items to move them, drag them away to undress, scroll to resize! Tap a friend below to switch.'
};
var EN=new URLSearchParams(location.search).get('lang')==='en';
var orig=new WeakMap();
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    if(!orig.has(el)) orig.set(el, el.innerHTML);
    var ko=orig.get(el).trim();
    el.innerHTML = EN ? (STR[ko]!==undefined?STR[ko]:orig.get(el)) : orig.get(el);
  });
  document.getElementById('lang').textContent=EN?'KO':'EN';
  document.documentElement.lang=EN?'en':'ko';
  if(EN) document.title='Y2K CLOSET — drag-and-drop dress-up studio';
  renderCats(); renderRack(); renderBench();
}
document.getElementById('lang').addEventListener('click',function(){ EN=!EN; applyLang(); });
