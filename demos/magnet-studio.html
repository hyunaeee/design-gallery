<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPEL — 커서를 밀어내는 스튜디오 랜딩</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

/* 마우스 인터랙션: 떠 있는 키워드 칩·이미지 조각들이 커서를 밀어내듯 피하는 물리 랜딩 */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --lime: #d8ff3e; --ink: #101210; }
body { font-family: Archivo, "Noto Sans KR", sans-serif; height: 100vh; overflow: hidden;
       background: var(--ink); color: #f2f4ee; }

.field { position: fixed; inset: 0; }

/* 떠다니는 요소들 (커서 회피) */
.orb { position: absolute; will-change: transform; user-select: none; }
.orb.chip { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: #101210;
            background: #f2f4ee; border-radius: 99px; padding: 12px 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,.35); }
.orb.chip.lime { background: var(--lime); }
.orb.chip.ghost { background: transparent; color: #f2f4ee; border: 1.5px solid rgba(242,244,238,.4); }
.orb.pic { width: 130px; aspect-ratio: 1; border-radius: 16px; object-fit: cover;
           box-shadow: 0 16px 40px rgba(0,0,0,.5); }
.orb.emoji { font-size: 40px; filter: drop-shadow(0 8px 16px rgba(0,0,0,.4)); }

.center { position: fixed; inset: 0; z-index: 5; display: flex; flex-direction: column;
          align-items: center; justify-content: center; text-align: center; pointer-events: none; }
.center .kicker { font-family: "JetBrains Mono", monospace; font-size: 11.5px; letter-spacing: 4px;
                  color: var(--lime); }
.center h1 { margin-top: 18px; font-weight: 900; font-size: clamp(48px, 9vw, 128px);
             line-height: .95; letter-spacing: -.04em; text-transform: uppercase; }
.center h1 .hollow { color: transparent; -webkit-text-stroke: 2px #f2f4ee; }
.center p { margin-top: 22px; font-size: 14.5px; line-height: 1.8; color: rgba(242,244,238,.7);
            max-width: 400px; word-break: keep-all; }
.center .cta { pointer-events: auto; margin-top: 30px; font-family: inherit; font-size: 14px;
               font-weight: 700; letter-spacing: 1px; color: var(--ink); background: var(--lime);
               border: none; border-radius: 99px; padding: 16px 34px; cursor: pointer;
               will-change: transform; transition: box-shadow .25s; }
.center .cta:hover { box-shadow: 0 0 44px rgba(216,255,62,.5); }

nav { position: fixed; z-index: 10; top: 0; left: 0; right: 0; display: flex;
      justify-content: space-between; padding: 24px 4vw;
      font-family: "JetBrains Mono", monospace; font-size: 11.5px; letter-spacing: 2px; }
nav span b { color: var(--lime); }
.foot { position: fixed; z-index: 10; bottom: 0; left: 0; right: 0; display: flex;
        justify-content: space-between; padding: 20px 4vw;
        font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 2px;
        color: rgba(242,244,238,.5); }

@media (max-width: 760px) { .orb.pic { width: 90px; } }
</style>
</head>
<body>
<div class="field" id="field"></div>

<nav>
  <span><b>●</b> REPEL STUDIO</span>
  <span>DIGITAL PRODUCT & PLAY</span>
</nav>

<div class="center">
  <div class="kicker">CURSOR-PHYSICS LANDING</div>
  <h1>잡히지 <span class="hollow">않는</span><br>아이디어</h1>
  <p>커서를 휘저어 보세요 — 우리가 다루는 키워드들이 물리처럼 밀려납니다.
  잡히지 않아서, 계속 새롭습니다.</p>
  <button class="cta" id="cta">프로젝트 시작하기 →</button>
</div>

<div class="foot">
  <span>SEOUL — 성수동</span>
  <span>이미지 — AI 생성 (HIGGSFIELD)</span>
</div>

<script>
/* 필드 오브젝트: 키워드 칩 + 이미지 조각 + 이모지가 홈 위치로 복원되며 커서를 회피 */
const ITEMS = [
  { t: 'chip', txt: '브랜딩' }, { t: 'chip lime', txt: 'WebGL' }, { t: 'chip ghost', txt: '모션' },
  { t: 'chip', txt: 'UX 리서치' }, { t: 'chip lime', txt: '프로토타입' }, { t: 'chip ghost', txt: 'AI 파이프라인' },
  { t: 'chip', txt: '디자인 시스템' }, { t: 'chip ghost', txt: '3D' }, { t: 'chip lime', txt: '인터랙션' },
  { t: 'pic', src: '../assets/gen/chrome.png' }, { t: 'pic', src: '../assets/gen/botanical.png' },
  { t: 'pic', src: '../assets/gen/brutalist.png' }, { t: 'pic', src: '../assets/gen/fashion-2.png' },
  { t: 'emoji', txt: '⚡' }, { t: 'emoji', txt: '👾' }, { t: 'emoji', txt: '✳️' },
];
const field = document.getElementById('field');
const orbs = [];

/* 중앙 텍스트를 피해 도넛형으로 홈 위치 배치 */
ITEMS.forEach((it, i) => {
  const el = it.t === 'pic' ? document.createElement('img') : document.createElement('div');
  el.className = 'orb ' + it.t;
  if (it.t === 'pic') el.src = it.src; else el.textContent = it.txt;
  field.appendChild(el);
  const ang = (i / ITEMS.length) * Math.PI * 2 + (i % 2 ? .35 : 0);
  const rad = .68 + (i % 3) * .13;                      /* 중앙 텍스트를 피해 가장자리 링에 배치 */
  orbs.push({ el, ang, rad, x: 0, y: 0, vx: 0, vy: 0 });
});

let mx = -9999, my = -9999;
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
addEventListener('touchmove', e => { mx = e.touches[0].clientX; my = e.touches[0].clientY; }, { passive: true });
addEventListener('mouseleave', () => { mx = my = -9999; });

const cta = document.getElementById('cta');

/* 초기 위치를 홈으로 스냅 (첫 프레임 튀는 것 방지) */
orbs.forEach(o => {
  const cx = innerWidth / 2, cy = innerHeight / 2;
  o.x = cx + Math.cos(o.ang) * o.rad * innerWidth * .5;
  o.y = cy + Math.sin(o.ang) * o.rad * innerHeight * .5;
});

let frames = 0;
(function loop() {
  if (window.__paused && frames > 5) { setTimeout(() => requestAnimationFrame(loop), 300); return; }
  frames++;
  const cx = innerWidth / 2, cy = innerHeight / 2;
  const base = Math.min(innerWidth, innerHeight);
  for (const o of orbs) {
    /* 홈 위치 (은은한 자전) */
    o.ang += .0009;
    const hx = cx + Math.cos(o.ang) * o.rad * innerWidth * .5;
    const hy = cy + Math.sin(o.ang) * o.rad * innerHeight * .5;
    /* 스프링 복원 */
    o.vx += (hx - o.x) * .012; o.vy += (hy - o.y) * .012;
    /* 커서 회피 (반경 180px) */
    const dx = o.x - mx, dy = o.y - my, d = Math.hypot(dx, dy);
    if (d < 180 && d > 0) {
      const f = (1 - d / 180) * 3.4;
      o.vx += (dx / d) * f; o.vy += (dy / d) * f;
    }
    o.vx *= .88; o.vy *= .88;                            /* 감쇠 */
    o.x += o.vx; o.y += o.vy;
    o.el.style.transform = `translate(${(o.x - 60).toFixed(1)}px, ${(o.y - 24).toFixed(1)}px)
                            rotate(${(o.vx * 1.4).toFixed(1)}deg)`;
  }
  /* CTA 마그네틱 (끌림) */
  const r = cta.getBoundingClientRect();
  const bx = r.left + r.width / 2, by = r.top + r.height / 2;
  const dx = mx - bx, dy = my - by, d = Math.hypot(dx, dy);
  const pull = d < 200 && d > 0 ? (1 - d / 200) * 22 : 0;
  cta.style.transform = `translate(${(dx / (d || 1)) * pull}px, ${(dy / (d || 1)) * pull}px)`;
  requestAnimationFrame(loop);
})();

</script>
<script>
/* ── English mode (?lang=en) — non-destructive DOM text swap ── */
(function(){
  const __EN = new URLSearchParams(location.search).get('lang') === 'en';
  if (!__EN) return;
  const TR = {
    "REPEL — 커서를 밀어내는 스튜디오 랜딩": "REPEL — A Studio Landing That Repels Your Cursor",
    "잡히지": "IDEAS YOU",
    "않는": "CAN'T",
    "아이디어": "PIN DOWN",
    "커서를 휘저어 보세요 — 우리가 다루는 키워드들이 물리처럼 밀려납니다.\n  잡히지 않아서, 계속 새롭습니다.":
      "Stir the cursor around — the keywords we work with get pushed away like physics.\n  Never caught, they always feel new.",
    "프로젝트 시작하기 →": "Start a Project →",
    "SEOUL — 성수동": "SEOUL — SEONGSU",
    "이미지 — AI 생성 (HIGGSFIELD)": "IMAGES — AI-GENERATED (HIGGSFIELD)",
    "브랜딩": "Branding",
    "모션": "Motion",
    "UX 리서치": "UX Research",
    "프로토타입": "Prototype",
    "AI 파이프라인": "AI Pipeline",
    "디자인 시스템": "Design System",
    "인터랙션": "Interaction"
  };
  const swap = s => { const t = s.trim(); return TR[t] != null ? s.replace(t, TR[t]) : s; };
  const walk = n => {
    if (n.nodeType === 3) { if (TR[n.nodeValue.trim()] != null) n.nodeValue = swap(n.nodeValue); return; }
    if (n.nodeType !== 1) return;
    ['placeholder','title','alt','aria-label'].forEach(a => { if (n.hasAttribute && n.hasAttribute(a) && TR[n.getAttribute(a).trim()] != null) n.setAttribute(a, TR[n.getAttribute(a).trim()]); });
    n.childNodes.forEach(walk);
  };
  new MutationObserver(muts => muts.forEach(m => m.addedNodes.forEach(walk))).observe(document.body, {childList:true, subtree:true});
  walk(document.body);
  if (TR[document.title.trim()]) document.title = TR[document.title.trim()];
})();
</script>
</body>
</html>
