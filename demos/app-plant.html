<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n>이파리 — 식물 케어 앱 UI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --sage: #7c9473; --sage-d: #5b7350; --cream: #f8f4ea; --panel: #ffffff;
  --ink: #34382e; --dim: #8b8e7f; --line: #ece6d8; --amber: #d9a441; --red: #d9704a;
}
html, body { height: 100%; }
body {
  font-family: 'Inter', 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 40px 20px; position: relative; overflow-x: hidden; color: #1c1c22;
  background: radial-gradient(ellipse 80% 55% at 50% 32%, #ffffff 0%, #e7e8ec 55%, #d7d9de 100%);
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(circle at 18% 18%, rgba(124,148,115,.09), transparent 42%),
              radial-gradient(circle at 85% 78%, rgba(217,164,65,.08), transparent 42%);
}

/* ── 폰 목업 ── */
.phone { position: relative; z-index: 1; width: 390px; height: 844px; flex-shrink: 0;
  border-radius: 54px; background: linear-gradient(160deg, #2a2a30, #0a0a0c 60%); padding: 12px;
  box-shadow: 0 60px 120px -40px rgba(20, 20, 30, .45), 0 24px 50px -24px rgba(20, 20, 30, .35),
              inset 0 0 0 2px #3a3a40; }
.screen { position: relative; width: 100%; height: 100%; border-radius: 42px; overflow: hidden;
  background: var(--cream); display: flex; flex-direction: column; color: var(--ink); }
.notch { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 120px;
  height: 32px; background: #0a0a0c; border-radius: 20px; z-index: 100; }
.statusbar { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between;
  align-items: center; padding: 18px 26px 4px; z-index: 80; color: var(--ink); }
.statusbar.on-hero { color: #fff; }
.statusbar .time { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
.stat-icons { display: flex; align-items: center; gap: 5px; }
.stat-icons svg { fill: currentColor; }
.i-signal { width: 17px; height: 11px; }
.i-wifi { width: 16px; height: 12px; }
.i-battery { width: 24px; height: 12px; border: 1.4px solid currentColor; border-radius: 3.5px;
  padding: 1.5px; position: relative; opacity: .95; }
.i-battery::after { content: ""; position: absolute; right: -3.5px; top: 3.5px; width: 2px; height: 5px;
  background: currentColor; border-radius: 0 2px 2px 0; }
.i-battery .fill { height: 100%; width: 82%; background: currentColor; border-radius: 1.5px; }
.home-indicator { position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%); width: 134px;
  height: 5px; border-radius: 99px; background: rgba(52,56,46,.45); z-index: 95; }

/* ── 화면 전환 (탭) ── */
.scr { position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transform: translateY(10px); transition: opacity .3s cubic-bezier(.2,.7,.2,1), transform .3s cubic-bezier(.2,.7,.2,1);
  overflow-y: auto; -ms-overflow-style: none; scrollbar-width: none; padding: 58px 0 108px; }
.scr::-webkit-scrollbar { display: none; }
.scr.active { opacity: 1; pointer-events: auto; transform: translateY(0); z-index: 5; }

/* ── 내 식물(홈) 화면 ── */
.home-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 20px 16px; position: relative; }
#ambientCanvas { position: absolute; inset: 0; top: -58px; height: 130px; z-index: 0; pointer-events: none; opacity: .55; }
.home-head .htxt { position: relative; z-index: 1; }
.home-head .htxt span { display: block; font-size: 12.5px; color: var(--dim); font-weight: 600; }
.home-head .htxt h2 { margin-top: 4px; font-size: 21px; font-weight: 800; letter-spacing: -.01em; }
.home-head .avatar { position: relative; z-index: 1; width: 40px; height: 40px; border-radius: 13px; flex-shrink: 0;
  background: linear-gradient(135deg, #cfe0c4, #9fb98d); display: grid; place-items: center; font-size: 18px; }

.summary-row { display: flex; gap: 10px; padding: 0 18px 20px; }
.sum-chip { flex: 1; background: var(--panel); border-radius: 14px; padding: 11px 8px; text-align: center;
  box-shadow: 0 10px 22px -18px rgba(60,60,40,.3); }
.sum-chip b { display: block; font-size: 16px; font-weight: 800; }
.sum-chip span { font-size: 10px; color: var(--dim); font-weight: 700; }

.plant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 18px; }
.plant-card { background: var(--panel); border-radius: 18px; overflow: hidden; cursor: pointer;
  box-shadow: 0 12px 26px -18px rgba(60,60,40,.35); transition: transform .18s; }
.plant-card:active { transform: scale(.96); }
.pc-media { position: relative; height: 118px; background: linear-gradient(150deg, #dfe9d4, #b9cca7); overflow: hidden; }
.pc-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pc-media.tint-b img { filter: hue-rotate(-18deg) saturate(1.1) brightness(1.02); }
.pc-media.c3 { background: linear-gradient(150deg, #a9c48e, #6f8f56); }
.pc-media.c4 { background: linear-gradient(150deg, #cfe0b0, #91ac6c); }
.pc-media.c5 { background: linear-gradient(150deg, #8fae7a, #4f6b3d); }
.pc-media.c6 { background: linear-gradient(150deg, #d8c9a3, #a98f5c); }
.pc-media .leaf-emo { position: absolute; inset: 0; display: grid; place-items: center; font-size: 40px; opacity: .9; }
.pc-ring { position: absolute; top: 8px; right: 8px; width: 34px; height: 34px; }
.pc-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.pc-ring .trk { fill: rgba(255,255,255,.4); }
.pc-ring .fil { fill: none; stroke-width: 3.4; stroke-linecap: round; }
.pc-ring .dtxt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 8.5px; font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
.pc-body { padding: 11px 12px 13px; }
.pc-body b { display: block; font-size: 14px; font-weight: 800; }
.pc-body span { font-size: 11px; color: var(--dim); font-style: italic; }

.sec-label { font-size: 15px; font-weight: 800; letter-spacing: -.01em; margin: 24px 18px 12px; }

/* ── 도감 화면 ── */
.guide-list, .notif-list { display: flex; flex-direction: column; gap: 10px; padding: 0 18px; }
.guide-row, .notif-row { display: flex; align-items: center; gap: 13px; background: var(--panel); border-radius: 16px;
  padding: 13px 14px; cursor: pointer; box-shadow: 0 10px 22px -18px rgba(60,60,40,.3); }
.guide-row .emo { width: 44px; height: 44px; border-radius: 12px; background: #eef2e5; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
.guide-row .gi { flex: 1; min-width: 0; }
.guide-row .gi b { display: block; font-size: 14px; font-weight: 700; }
.guide-row .gi span { font-size: 11.5px; color: var(--dim); }
.guide-row .chev { color: var(--dim); }

.notif-row { position: relative; align-items: flex-start; }
.notif-row .emo { width: 38px; height: 38px; border-radius: 50%; background: #eef2e5; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
.notif-row .ni { flex: 1; min-width: 0; }
.notif-row .ni p { font-size: 13.5px; font-weight: 600; line-height: 1.4; }
.notif-row .ni span { font-size: 11px; color: var(--dim); margin-top: 3px; display: block; }
.notif-row .dot { position: absolute; top: 14px; right: 14px; width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
#scr-notifs h2, #scr-guide h2 { font-size: 22px; font-weight: 800; padding: 0 18px 16px; letter-spacing: -.01em; }

/* ── 상세 화면 ── */
.detail-scr { position: absolute; inset: 0; z-index: 60; background: var(--cream); overflow-y: auto;
  transform: translateX(100%); transition: transform .34s cubic-bezier(.2,.8,.2,1); }
.detail-scr.active { transform: translateX(0); }
.detail-scr::-webkit-scrollbar { display: none; }
.d-hero { position: relative; height: 250px; background: linear-gradient(150deg, #dfe9d4, #b9cca7); }
.d-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.d-hero .ov { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,20,10,.35) 0%, transparent 30%, rgba(20,20,10,.65) 100%); }
.d-back { position: absolute; top: 54px; left: 16px; z-index: 5; width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,.35); backdrop-filter: blur(6px); border: none; color: #fff; font-size: 17px; cursor: pointer;
  display: grid; place-items: center; }
.d-hero .htext { position: absolute; left: 20px; right: 20px; bottom: 16px; color: #fff; }
.d-hero .htext h1 { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
.d-hero .htext p { font-size: 12.5px; opacity: .85; font-style: italic; margin-top: 2px; }

.d-body { padding: 18px 20px 30px; }
.dday-badge { display: inline-flex; align-items: center; gap: 6px; background: #eef2e5; color: var(--sage-d);
  font-size: 12.5px; font-weight: 800; padding: 7px 14px; border-radius: 99px; }
.dday-badge.urgent { background: #fbe6dd; color: var(--red); }

.gauge-row { display: flex; gap: 12px; margin: 18px 0; }
.gauge { flex: 1; background: var(--panel); border-radius: 16px; padding: 14px; box-shadow: 0 10px 22px -18px rgba(60,60,40,.3); }
.gauge .gh { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--dim); margin-bottom: 8px; }
.gauge .gh b { font-size: 15px; color: var(--ink); font-weight: 800; }
.gauge .gbar { height: 7px; border-radius: 99px; background: #ece6d8; overflow: hidden; }
.gauge .gbar i { display: block; height: 100%; border-radius: 99px; width: 0%; transition: width 1s cubic-bezier(.2,.8,.2,1); }
.gauge.light .gbar i { background: linear-gradient(90deg, #f4c66b, #d9a441); }
.gauge.humid .gbar i { background: linear-gradient(90deg, #7db8d6, #4a8fb0); }

.water-btn { display: block; width: 100%; height: 54px; border: none; border-radius: 16px; margin-top: 6px;
  background: var(--sage); color: #fff; font-family: inherit; font-size: 15.5px; font-weight: 800; cursor: pointer;
  position: relative; overflow: hidden; box-shadow: 0 16px 30px -12px rgba(91,115,80,.5); transition: transform .15s; }
.water-btn:active { transform: scale(.98); }
.water-btn .wfill { position: absolute; inset: 0; width: 0%; background: rgba(255,255,255,.28); transition: width 1.1s cubic-bezier(.3,.7,.3,1); }
.water-btn span { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
.droplet { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 20px; opacity: 0; }
.droplet.fall { animation: drop-fall 1.1s cubic-bezier(.5,0,.7,1) forwards; }
@keyframes drop-fall { 0% { opacity: 1; top: -20px; } 85% { opacity: 1; } 100% { opacity: 0; top: 70px; } }

.add-btn { display: block; width: 100%; height: 54px; border: 1.5px solid var(--sage); border-radius: 16px; margin-top: 6px;
  background: transparent; color: var(--sage-d); font-family: inherit; font-size: 15.5px; font-weight: 800; cursor: pointer;
  transition: transform .15s, background .2s; }
.add-btn:active { transform: scale(.98); background: #eef2e5; }

.detail-note { margin-top: 20px; font-size: 12.5px; color: var(--dim); line-height: 1.7; word-break: keep-all; }

/* ── 토스트 ── */
.toast { position: absolute; left: 50%; bottom: 110px; transform: translate(-50%, 12px); z-index: 200;
  background: rgba(40, 45, 32, .92); color: #fff; font-size: 13px; font-weight: 700; padding: 12px 20px;
  border-radius: 99px; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
  white-space: nowrap; box-shadow: 0 14px 30px -10px rgba(0,0,0,.4); }
.toast.show { opacity: 1; transform: translate(-50%, 0); }

/* ── 탭바 ── */
.tabbar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 40; display: flex;
  background: rgba(248, 244, 234, .93); backdrop-filter: blur(14px); border-top: 1px solid var(--line);
  padding: 9px 6px 22px; }
.tab { flex: 1; border: none; background: none; font-family: inherit; display: flex; flex-direction: column;
  align-items: center; gap: 3px; font-size: 10.5px; color: var(--dim); cursor: pointer; font-weight: 600;
  padding: 4px 0; transition: color .2s; }
.tab i { font-style: normal; font-size: 19px; filter: grayscale(1) opacity(.5); transition: filter .2s; }
.tab.on { color: var(--sage-d); font-weight: 800; }
.tab.on i { filter: none; }

/* ── 언어 토글 ── */
.lang-toggle { position: fixed; top: 22px; right: 22px; z-index: 500; background: rgba(20,20,26,.85);
  color: #fff; border: 1px solid rgba(255,255,255,.18); backdrop-filter: blur(10px); font-family: inherit;
  font-weight: 700; font-size: 12.5px; letter-spacing: .03em; padding: 9px 16px; border-radius: 99px;
  cursor: pointer; box-shadow: 0 10px 24px -8px rgba(0,0,0,.35); transition: transform .15s, background .2s; }
.lang-toggle:hover { background: #26262f; }
.lang-toggle:active { transform: scale(.94); }

@media (max-width: 480px) {
  body { padding: 0; }
  .phone { width: 100vw; height: 100dvh; border-radius: 0; padding: 0; box-shadow: none; }
  .screen { border-radius: 0; }
  .notch { top: 10px; }
}
</style>
</head>
<body>

<button class="lang-toggle" id="lang">EN</button>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">

    <div class="statusbar" id="mainStatus">
      <span class="time">9:41</span>
      <div class="stat-icons">
        <svg class="i-signal" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg class="i-wifi" viewBox="0 0 18 14"><path d="M9 12.5a1.6 1.6 0 100-3.2 1.6 1.6 0 000 3.2zM3.5 7.2a8 8 0 0111 0l-1.5 1.6a5.8 5.8 0 00-8 0zM.7 4.2a12 12 0 0116.6 0L15.8 6a9.4 9.4 0 00-13.6 0z"/></svg>
        <div class="i-battery"><div class="fill"></div></div>
      </div>
    </div>

    <!-- 내 식물 화면 -->
    <section class="scr active" id="scr-myplants">
      <div class="home-head">
        <canvas id="ambientCanvas"></canvas>
        <div class="htxt">
          <span data-i18n>좋은 아침이에요 🌤️</span>
          <h2 data-i18n>내 식물 6그루</h2>
        </div>
        <span class="avatar">🌿</span>
      </div>

      <div class="summary-row">
        <div class="sum-chip"><b id="urgentCount">2</b><span data-i18n>오늘 물주기</span></div>
        <div class="sum-chip"><b>6</b><span data-i18n>전체 식물</span></div>
        <div class="sum-chip"><b>92%</b><span data-i18n>평균 건강도</span></div>
      </div>

      <p class="sec-label" data-i18n>내 식물</p>
      <div class="plant-grid" id="plantGrid"></div>
    </section>

    <!-- 도감 화면 -->
    <section class="scr" id="scr-guide">
      <h2 data-i18n>도감</h2>
      <div class="guide-list" id="guideList"></div>
    </section>

    <!-- 알림 화면 -->
    <section class="scr" id="scr-notifs">
      <h2 data-i18n>알림</h2>
      <div class="notif-list" id="notifList"></div>
    </section>

    <!-- 상세 화면 -->
    <div class="detail-scr" id="detailScr">
      <div class="statusbar on-hero"><span class="time">9:41</span>
        <div class="stat-icons">
          <svg class="i-signal" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg class="i-wifi" viewBox="0 0 18 14"><path d="M9 12.5a1.6 1.6 0 100-3.2 1.6 1.6 0 000 3.2zM3.5 7.2a8 8 0 0111 0l-1.5 1.6a5.8 5.8 0 00-8 0zM.7 4.2a12 12 0 0116.6 0L15.8 6a9.4 9.4 0 00-13.6 0z"/></svg>
          <div class="i-battery"><div class="fill"></div></div>
        </div>
      </div>
      <div class="d-hero">
        <img src="../assets/gen/app-plant.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="ov"></div>
        <button class="d-back" id="detailBack" aria-label="뒤로">‹</button>
        <div class="htext"><h1 id="dName">몬스테라</h1><p id="dSpecies">Monstera deliciosa</p></div>
      </div>
      <div class="d-body">
        <span class="dday-badge" id="ddayBadge">물주기 D-5</span>
        <div class="gauge-row">
          <div class="gauge light"><div class="gh"><span data-i18n>광량</span><b id="lightVal">78%</b></div><div class="gbar"><i id="lightBar" style="background:#d9a441"></i></div></div>
          <div class="gauge humid"><div class="gh"><span data-i18n>습도</span><b id="humidVal">52%</b></div><div class="gbar"><i id="humidBar"></i></div></div>
        </div>
        <button class="water-btn" id="waterBtn"><div class="wfill" id="waterFill"></div><span><span id="waterBtnLabel" data-i18n>물 주기</span> <span class="droplet" id="dropletIcon">💧</span></span></button>
        <button class="add-btn" id="addBtn" style="display:none" data-i18n>내 식물에 추가</button>
        <p class="detail-note" id="detailNote" data-i18n>몬스테라는 밝은 간접광과 통풍이 잘 되는 곳을 좋아해요. 흙 표면이 마르면 충분히 물을 주세요.</p>
      </div>
    </div>

    <div class="toast" id="toast">물을 줬어요 💧</div>

    <!-- 탭바 -->
    <nav class="tabbar" id="tabbar">
      <button class="tab on" data-tab="myplants"><i>🪴</i><span data-i18n>내 식물</span></button>
      <button class="tab" data-tab="guide"><i>📖</i><span data-i18n>도감</span></button>
      <button class="tab" data-tab="notifs"><i>🔔</i><span data-i18n>알림</span></button>
    </nav>
    <div class="home-indicator"></div>
  </div>
</div>

<script>
/* ═══ 이파리 식물 케어 앱 로직 ═══ */
const $ = id => document.getElementById(id);

const PLANTS = [
  { id: 1, name: '몬스테라',   species: 'Monstera deliciosa',       img: true,  tint: '',       maxDays: 7,  daysLeft: 5,  light: 78, humidity: 52, note: '몬스테라는 밝은 간접광과 통풍이 잘 되는 곳을 좋아해요. 흙 표면이 마르면 충분히 물을 주세요.' },
  { id: 2, name: '스투키',     species: 'Sansevieria cylindrica',   img: true,  tint: 'tint-b', maxDays: 14, daysLeft: 9,  light: 65, humidity: 30, note: '스투키는 건조한 환경을 선호해요. 흙이 완전히 마른 뒤 물을 주는 것이 좋아요.' },
  { id: 3, name: '홍콩야자',   species: 'Schefflera arboricola',    img: false, tint: 'c3',     maxDays: 7,  daysLeft: 1,  light: 70, humidity: 48, note: '잎에 먼지가 쌓이면 광합성이 줄어드니 젖은 천으로 가끔 닦아주세요.' },
  { id: 4, name: '테이블야자', species: 'Chamaedorea elegans',      img: false, tint: 'c4',     maxDays: 7,  daysLeft: 4,  light: 55, humidity: 60, note: '반그늘에서도 잘 자라며 습도를 좋아해서 잎에 분무를 자주 해주면 좋아요.' },
  { id: 5, name: '산세베리아', species: 'Sansevieria trifasciata',  img: false, tint: 'c5',     maxDays: 18, daysLeft: 12, light: 40, humidity: 25, note: '공기 정화 능력이 뛰어나고 물을 자주 주지 않아도 잘 자라는 강한 식물이에요.' },
  { id: 6, name: '백량금',     species: 'Ardisia crenata',          img: false, tint: 'c6',     maxDays: 6,  daysLeft: 0,  light: 60, humidity: 55, note: '겨울철 빨간 열매가 매력적이에요. 흙이 마르지 않도록 자주 살펴봐 주세요.' },
];

const GUIDE = [
  { name: '몬스테라',   tip: '주 1회 물주기 · 밝은 간접광', emoji: '🌿' },
  { name: '스투키',     tip: '2주에 1회 물주기 · 건조 선호', emoji: '🪴' },
  { name: '홍콩야자',   tip: '주 1회 물주기 · 잎 먼지 관리', emoji: '🌳' },
  { name: '산세베리아', tip: '월 2회 물주기 · 직사광 주의', emoji: '🌵' },
];

const NOTIFS = [
  { icon: '💧', text: '홍콩야자에게 물 줄 시간이에요', time: '2시간 전', unread: true,  plantId: 3 },
  { icon: '🌿', text: '몬스테라에 새 잎이 자라고 있어요', time: '어제', unread: true,  plantId: 1 },
  { icon: '☀️', text: '백량금이 빛을 더 필요로 해요',    time: '2일 전', unread: false, plantId: 6 },
  { icon: '🎉', text: '스투키를 등록한 지 100일이 되었어요', time: '3일 전', unread: false, plantId: 2 },
];

let curDetailId = null, detailMode = 'mine', fromTab = 'myplants';

function ringColor(level) { return level <= 0.16 ? 'var(--red)' : level <= 0.42 ? 'var(--amber)' : 'var(--sage)'; }

function cardHTML(p) {
  const level = p.daysLeft / p.maxDays;
  const c = 2 * Math.PI * 13.5;
  const off = c * (1 - Math.min(Math.max(level, 0.04), 1));
  const media = p.img
    ? `<div class="pc-media ${p.tint}"><img src="../assets/gen/app-plant.jpg" alt="" loading="lazy" onerror="this.parentElement.querySelector('.leaf-emo').style.display='grid';this.remove()"><span class="leaf-emo" style="display:none">🌿</span></div>`
    : `<div class="pc-media ${p.tint}"><span class="leaf-emo">${['🌿','🪴','🌳','🌵'][p.id % 4]}</span></div>`;
  return `<div class="plant-card" data-id="${p.id}">
    ${media}
    <div class="pc-ring">
      <svg viewBox="0 0 32 32"><circle class="trk" cx="16" cy="16" r="13.5"/>
        <circle class="fil" cx="16" cy="16" r="13.5" stroke="${ringColor(level)}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>
      <div class="dtxt">${p.daysLeft <= 0 ? 'D' : 'D-' + p.daysLeft}</div>
    </div>
    <div class="pc-body"><b data-i18n-dyn="${p.name}">${p.name}</b><span data-i18n-dyn="${p.species}">${p.species}</span></div>
  </div>`;
}
function renderGrid() {
  $('plantGrid').innerHTML = PLANTS.map(cardHTML).join('');
  $('urgentCount').textContent = PLANTS.filter(p => p.daysLeft <= 1).length;
  document.querySelectorAll('.plant-card').forEach(el => {
    el.addEventListener('click', () => openDetail(+el.dataset.id, 'mine'));
  });
}

function buildGuide() {
  $('guideList').innerHTML = GUIDE.map((g, i) => `
    <div class="guide-row" data-gi="${i}">
      <span class="emo">${g.emoji}</span>
      <div class="gi"><b data-i18n-dyn="${g.name}">${g.name}</b><span data-i18n-dyn="${g.tip}">${g.tip}</span></div>
      <span class="chev">›</span>
    </div>`).join('');
  document.querySelectorAll('.guide-row').forEach(row => {
    row.addEventListener('click', () => {
      const g = GUIDE[+row.dataset.gi];
      const match = PLANTS.find(p => p.name === g.name);
      openDetail(match ? match.id : PLANTS[0].id, match ? 'mine' : 'guide');
    });
  });
}

function buildNotifs() {
  $('notifList').innerHTML = NOTIFS.map((n, i) => `
    <div class="notif-row" data-ni="${i}">
      <span class="emo">${n.icon}</span>
      <div class="ni"><p data-i18n-dyn="${n.text}">${n.text}</p><span data-i18n-dyn="${n.time}">${n.time}</span></div>
      ${n.unread ? '<span class="dot"></span>' : ''}
    </div>`).join('');
  document.querySelectorAll('.notif-row').forEach(row => {
    row.addEventListener('click', () => {
      const n = NOTIFS[+row.dataset.ni];
      if (n.plantId) openDetail(n.plantId, 'mine');
    });
  });
}

/* ── 상세 화면 ── */
function openDetail(id, mode) {
  const p = PLANTS.find(x => x.id === id);
  curDetailId = id; detailMode = mode;
  $('dName').textContent = tr(p.name);
  $('dSpecies').textContent = p.species;
  $('detailNote').textContent = tr(p.note);
  $('lightVal').textContent = p.light + '%';
  $('humidVal').textContent = p.humidity + '%';
  requestAnimationFrame(() => { $('lightBar').style.width = p.light + '%'; $('humidBar').style.width = p.humidity + '%'; });
  updateDday(p);
  const mine = mode === 'mine';
  $('waterBtn').style.display = mine ? 'block' : 'none';
  $('addBtn').style.display = mine ? 'none' : 'block';
  $('detailScr').classList.add('active');
}
function updateDday(p) {
  const urgent = p.daysLeft <= 1;
  $('ddayBadge').classList.toggle('urgent', urgent);
  $('ddayBadge').textContent = (p.daysLeft <= 0 ? tr('오늘 물주기') : `${tr('물주기')} D-${p.daysLeft}`);
}
$('detailBack').addEventListener('click', () => { $('detailScr').classList.remove('active'); renderGrid(); refreshDynamic(); });
$('addBtn').addEventListener('click', () => { showToast(tr('내 식물에 추가했어요 🌿')); });

function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => t.classList.remove('show'), 2000);
}

$('waterBtn').addEventListener('click', () => {
  if (curDetailId == null) return;
  const p = PLANTS.find(x => x.id === curDetailId);
  $('waterBtn').style.pointerEvents = 'none';
  $('waterFill').style.width = '100%';
  $('dropletIcon').classList.remove('fall'); void $('dropletIcon').offsetWidth;
  $('dropletIcon').classList.add('fall');
  setTimeout(() => {
    p.daysLeft = p.maxDays;
    updateDday(p);
    $('waterFill').style.width = '0%';
    $('waterBtn').style.pointerEvents = 'auto';
    showToast(tr('물을 줬어요 💧'));
    renderGrid(); refreshDynamic();
  }, 1150);
});

/* ── 탭 전환 ── */
function showTab(name) {
  fromTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === name));
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('active'));
  $('scr-' + name).classList.add('active');
  $('detailScr').classList.remove('active');
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));

/* ═══ rAF 루프: 홈 헤더 위 은은한 잎가루 파티클 (갤러리 공통 __paused 가드) ═══ */
const ac = $('ambientCanvas');
const actx = ac.getContext('2d');
let particles = [], frames = 0;
function resizeCanvas() { ac.width = ac.clientWidth || 390; ac.height = ac.clientHeight || 130; }
function initParticles() {
  particles = Array.from({ length: 14 }, () => ({
    x: Math.random() * ac.width, y: Math.random() * ac.height,
    r: 1.4 + Math.random() * 2.2, s: .18 + Math.random() * .3, o: .25 + Math.random() * .4
  }));
}
resizeCanvas(); initParticles();
window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

(function loop(t) {
  if (window.__paused && frames > 5) { setTimeout(() => requestAnimationFrame(loop), 300); return; }
  frames++;
  actx.clearRect(0, 0, ac.width, ac.height);
  particles.forEach(p => {
    p.y -= p.s;
    if (p.y < -4) { p.y = ac.height + 4; p.x = Math.random() * ac.width; }
    actx.beginPath(); actx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    actx.fillStyle = `rgba(124,148,115,${p.o})`; actx.fill();
  });
  requestAnimationFrame(loop);
})();

renderGrid();
buildGuide();
buildNotifs();

let EN = new URLSearchParams(location.search).get('lang') === 'en';
const orig = new WeakMap();
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (!orig.has(el)) orig.set(el, el.innerHTML);
    const ko = orig.get(el).trim();
    el.innerHTML = EN ? (STR[ko] ?? orig.get(el)) : orig.get(el);
  });
  document.documentElement.lang = EN ? 'en' : 'ko';
}
applyLang();

/* 동적으로 주입되는 한국어(식물명·도감·알림)도 동일한 STR 사전으로 번역 */
function tr(ko) { return EN ? (STR[ko] ?? ko) : ko; }
function refreshDynamic() {
  document.querySelectorAll('[data-i18n-dyn]').forEach(el => { el.textContent = tr(el.dataset.i18nDyn); });
  if (curDetailId != null && $('detailScr').classList.contains('active')) {
    const p = PLANTS.find(x => x.id === curDetailId);
    $('dName').textContent = tr(p.name);
    $('detailNote').textContent = tr(p.note);
    updateDday(p);
  }
  document.getElementById('lang').textContent = EN ? 'KO' : 'EN';
}
document.getElementById('lang').addEventListener('click', () => { EN = !EN; applyLang(); refreshDynamic(); });
refreshDynamic();
