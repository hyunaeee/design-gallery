<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키네틱 타이포 — 커서에 반응하는 글자들의 춤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --ink:#eceae1; --paper:#0b0b12; --paper2:#14141c; --pop:#00eaff;
  --mut:rgba(236,234,225,.55); --mut2:rgba(236,234,225,.32); --line:rgba(236,234,225,.9); }
html, body { height: 100%; }
body { font-family: "Space Grotesk", "Noto Sans KR", sans-serif;
  background: radial-gradient(120% 120% at 50% 0%, var(--paper2) 0%, var(--paper) 70%); color: var(--ink);
  overflow: hidden; -webkit-font-smoothing: antialiased; cursor: crosshair; }
/* 스위스 그리드 라인 */
.grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 25vw 25vh; opacity: .06; }

/* 상단 HUD */
.hud { position: fixed; top: 22px; left: 26px; right: 26px; z-index: 10; display: flex;
  justify-content: space-between; align-items: flex-start; font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
.hud .brand b { font-weight: 700; }
.hud .brand span { display: block; color: var(--mut); margin-top: 4px; }
.hud .rt { text-align: right; color: var(--mut); line-height: 1.8; }
.hud .rt b { color: var(--pop); text-shadow: 0 0 10px rgba(0,234,255,.5); }

/* 스테이지 */
.stage { position: relative; z-index: 5; width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; user-select: none; }
.line { display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
  line-height: .92; }
.line + .line { margin-top: .1em; }
.ch { display: inline-block; font-weight: 700; will-change: transform;
  font-size: clamp(44px, 12vw, 150px); letter-spacing: -.02em; position: relative; }
.ch.space { width: .32em; }
/* 그림자 모드용 가상 그림자 */
.ch::after { content: attr(data-c); position: absolute; left: 0; top: 0; z-index: -1;
  color: rgba(120,90,255,.18); opacity: 0; }
body.mode-shadow .ch::after { opacity: 1; }

/* ── 오로라(북극광) 강조: 초록→시안→보라→핑크 그라디언트가 흐르는 글자 ── */
@keyframes aurora-shift { to { background-position: 300% 50%; } }
.ch.hot {
  background-image: linear-gradient(100deg,
    #38ffb0 0%, #00eaff 22%, #6ea8ff 44%, #b06bff 64%, #ff69c6 82%, #38ffb0 100%);
  background-size: 300% 100%;
  background-position: 0% 50%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  animation: aurora-shift 5.5s linear infinite;
}

/* 부제 */
.tagline { margin-top: 5vh; font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--mut); }

/* 모드 버튼 */
.modes { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 10;
  display: flex; gap: 8px; }
.modes button { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 1px;
  text-transform: uppercase; padding: 10px 18px; border: 1.5px solid var(--ink); background: transparent;
  color: var(--ink); cursor: pointer; transition: all .15s; }
.modes button:hover { background: var(--ink); color: var(--paper); }
.modes button.on { background: var(--pop); border-color: var(--pop); color: #05121a;
  box-shadow: 0 0 18px rgba(0,234,255,.45); }

.auto-tag { position: fixed; bottom: 26px; right: 26px; z-index: 10; font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 1px; color: var(--mut); display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none; }
.auto-tag .led { width: 8px; height: 8px; border-radius: 50%; background: var(--pop);
  box-shadow: 0 0 10px var(--pop); }
.auto-tag.off .led { background: var(--mut2); box-shadow: none; }

/* ── 글멋 GULMUT 브랜드 랜딩 오버레이 ── */
.gm-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 11;
  display: flex; align-items: center; gap: 6px; padding: 6px; background: rgba(20,20,28,.72);
  border: 1.5px solid var(--ink); border-radius: 4px; backdrop-filter: blur(8px); }
.gm-nav a { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 1px;
  text-transform: uppercase; text-decoration: none; color: var(--ink); padding: 7px 14px;
  transition: all .15s; }
.gm-nav a:hover { background: var(--ink); color: var(--paper); }
.gm-nav a.gm-cta { background: var(--pop); color: #05121a; font-weight: 700;
  box-shadow: 0 0 16px rgba(0,234,255,.4); }
.gm-nav a.gm-cta:hover { background: var(--ink); color: var(--paper); box-shadow: none; }
.gm-copy { position: fixed; bottom: 26px; left: 26px; z-index: 10; max-width: 340px; }
.gm-copy h2 { font-size: clamp(24px, 3vw, 40px); font-weight: 700; line-height: 1.05;
  letter-spacing: -.02em; color: var(--ink); word-break: keep-all; }
.gm-copy p { margin-top: 12px; font-size: 13px; line-height: 1.6; color: var(--mut);
  word-break: keep-all; }
@media (max-width: 640px) {
  .modes { flex-wrap: wrap; justify-content: center; width: 90%; }
  .hud .rt { display: none; }
  .gm-nav { display: none; }
  .gm-copy { max-width: 60%; }
}
</style>
</head>
<body class="mode-wave">
<div class="grid-bg"></div>

<div class="hud">
  <div class="brand"><b>글멋 GULMUT</b><span>TYPE FOUNDRY · 001</span></div>
  <div class="rt">MODE — <b id="modeLbl">WAVE</b><br>CURSOR VELOCITY <span id="velLbl">0.00</span></div>
</div>

<nav class="gm-nav">
  <a href="#">서체</a><a href="#">라이선스</a><a href="#">커스텀</a>
  <a class="gm-cta" href="#">서체 둘러보기</a>
</nav>

<div class="gm-copy">
  <h2>움직이는 글자를 팝니다.</h2>
  <p>커서에 반응하는 살아있는 서체. 지금 화면 속 글자가 곧 견본입니다.</p>
</div>

<div class="stage" id="stage"></div>

<div class="modes" id="modes">
  <button data-mode="wave" class="on">웨이브</button>
  <button data-mode="magnetic">마그네틱</button>
  <button data-mode="scatter">흩뿌림</button>
  <button data-mode="shadow">그림자</button>
</div>
<div class="auto-tag" id="autoTag"><span class="led"></span>AUTO</div>

<script>
/* ── 상태/요소 선언 (rAF 루프보다 먼저!) ── */
const stage = document.getElementById('stage');
const modeLbl = document.getElementById('modeLbl');
const velLbl = document.getElementById('velLbl');
const modesWrap = document.getElementById('modes');
const autoTag = document.getElementById('autoTag');

/* ── 다국어 딕셔너리 (?lang=en 이면 영어) ── */
const LANG = new URLSearchParams(location.search).get('lang') === 'en' ? 'en' : 'ko';
const STR = {
  ko: {
    title: '키네틱 타이포 — 커서에 반응하는 글자들의 춤',
    brand: '글멋 GULMUT',
    nav: ['서체', '라이선스', '커스텀', '서체 둘러보기'],
    h2: '움직이는 글자를 팝니다.',
    p: '커서에 반응하는 살아있는 서체. 지금 화면 속 글자가 곧 견본입니다.',
    modes: { wave:'웨이브', magnetic:'마그네틱', scatter:'흩뿌림', shadow:'그림자' },
    tagline: 'MOVE YOUR CURSOR · 커서를 움직여 보세요',
    phrases: [
      ['움직임은', '언어다'],
      ['TYPE', 'IN MOTION'],
      ['글자가', '춤춘다'],
      ['DESIGN', 'IS RHYTHM'],
    ],
  },
  en: {
    title: 'Kinetic Type — Letters That Dance to Your Cursor',
    brand: 'GULMUT',
    nav: ['Typefaces', 'License', 'Custom', 'Browse Typefaces'],
    h2: 'We sell moving letters.',
    p: 'A living typeface that reacts to your cursor. The letters on screen are the specimen.',
    modes: { wave:'WAVE', magnetic:'MAGNETIC', scatter:'SCATTER', shadow:'SHADOW' },
    tagline: 'MOVE YOUR CURSOR',
    phrases: [
      ['MOTION IS', 'LANGUAGE'],
      ['TYPE', 'IN MOTION'],
      ['LETTERS', 'DANCE'],
      ['DESIGN', 'IS RHYTHM'],
    ],
  },
};
const T = STR[LANG];
const PHRASES = T.phrases;
const MODES = ['wave', 'magnetic', 'scatter', 'shadow'];
const MODE_KR = { wave:'WAVE', magnetic:'MAGNETIC', scatter:'SCATTER', shadow:'SHADOW' };

/* 정적 텍스트에 언어 적용 */
function applyLang() {
  document.documentElement.lang = LANG;
  document.title = T.title;
  const brand = document.querySelector('.brand b'); if (brand) brand.textContent = T.brand;
  const navA = document.querySelectorAll('.gm-nav a');
  T.nav.forEach((txt, i) => { if (navA[i]) navA[i].textContent = txt; });
  const h2 = document.querySelector('.gm-copy h2'); if (h2) h2.textContent = T.h2;
  const p = document.querySelector('.gm-copy p'); if (p) p.textContent = T.p;
  [...modesWrap.children].forEach(b => { b.textContent = T.modes[b.dataset.mode]; });
}
applyLang();

let mode = 'wave';
let phraseIdx = 0;
let auto = true;
let chars = [];         /* {el, hx, hy, ox, oy, seed} — 홈 좌표 및 현재 오프셋 */
let mouse = { x: innerWidth/2, y: innerHeight/2, px: innerWidth/2, py: innerHeight/2, vel: 0 };
let hasInput = false;   /* 사용자 입력 여부 (없으면 오토 브리딩) */

/* 문구를 글자 span으로 렌더 */
function buildPhrase(idx) {
  const lines = PHRASES[idx];
  stage.innerHTML = lines.map(line => {
    const spans = [...line].map(c => c === ' '
      ? `<span class="ch space"></span>`
      : `<span class="ch" data-c="${c}">${c}</span>`).join('');
    return `<div class="line">${spans}</div>`;
  }).join('') + `<div class="tagline">${T.tagline}</div>`;
  /* 홈 좌표 캐시 */
  chars = [...stage.querySelectorAll('.ch:not(.space)')].map((el, i) => {
    const r = el.getBoundingClientRect();
    return { el, hx: r.left + r.width/2, hy: r.top + r.height/2, ox: 0, oy: 0,
             rot: 0, scale: 1, seed: i * 0.7 };
  });
}
buildPhrase(0);
/* 리사이즈 시 홈 좌표 갱신 */
addEventListener('resize', () => {
  chars.forEach(c => {
    c.el.style.transform = '';
    const r = c.el.getBoundingClientRect();
    c.hx = r.left + r.width/2; c.hy = r.top + r.height/2;
  });
});

/* 입력 추적 */
function track(x, y) { mouse.x = x; mouse.y = y; hasInput = true; }
addEventListener('mousemove', e => track(e.clientX, e.clientY));
addEventListener('touchmove', e => { if (e.touches[0]) track(e.touches[0].clientX, e.touches[0].clientY); }, { passive:true });

/* 모드 전환 */
function setMode(m) {
  mode = m;
  document.body.className = 'mode-' + m;
  modeLbl.textContent = MODE_KR[m];
  [...modesWrap.children].forEach(b => b.classList.toggle('on', b.dataset.mode === m));
}
modesWrap.addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  auto = false; autoTag.classList.add('off');
  setMode(b.dataset.mode);
});
autoTag.addEventListener('click', () => {
  auto = !auto; autoTag.classList.toggle('off', !auto);
});

/* 오토 순환: 6초마다 모드/문구 교체 */
let autoT = 0;
function autoStep() {
  const mi = (MODES.indexOf(mode) + 1) % MODES.length;
  setMode(MODES[mi]);
  if (mi === 0) { phraseIdx = (phraseIdx + 1) % PHRASES.length; buildPhrase(phraseIdx); }
}

/* 오로라 글로우: 강도(0~1)에 따라 초록·시안·보라가 겹치는 다색 발광 */
function auroraGlow(a) {
  return `0 0 ${(a*10+2).toFixed(1)}px rgba(56,255,176,${(a*0.5).toFixed(2)}),
    0 0 ${(a*20+4).toFixed(1)}px rgba(0,234,255,${(a*0.55).toFixed(2)}),
    0 0 ${(a*34+6).toFixed(1)}px rgba(176,107,255,${(a*0.4).toFixed(2)})`;
}

/* ── 메인 루프 ── */
let frames = 0, t = 0;
(function loop(){
  if (window.__paused && frames > 5) { setTimeout(() => requestAnimationFrame(loop), 300); return; }
  frames++; t += 0.016;

  /* 커서 속도 계산 */
  const dvx = mouse.x - mouse.px, dvy = mouse.y - mouse.py;
  mouse.vel += (Math.hypot(dvx, dvy) - mouse.vel) * 0.2;
  mouse.px = mouse.x; mouse.py = mouse.y;
  velLbl.textContent = mouse.vel.toFixed(2);

  /* 오토 순환 타이머 */
  if (auto) { autoT += 0.016; if (autoT > 6) { autoT = 0; autoStep(); } }
  else autoT = 0;

  chars.forEach((c, i) => {
    const dx = mouse.x - c.hx, dy = mouse.y - c.hy;
    const dist = Math.hypot(dx, dy) || 0.001;
    /* 입력 없을 때 은은한 숨쉬기 */
    const breath = Math.sin(t * 1.4 + c.seed) * 4;
    const breathS = 1 + Math.sin(t * 1.1 + c.seed) * 0.02;

    let tx = 0, ty = breath, sx = breathS, sy = breathS, rot = 0, ls = 0, shX = 0, shY = 0;

    if (hasInput) {
      if (mode === 'wave') {
        /* 커서 근처 글자가 크게 + 물결 */
        const infl = Math.max(0, 1 - dist / 340);
        sx = sy = 1 + infl * 1.3;
        ty = breath - infl * 34 + Math.sin(t * 3 + c.seed) * infl * 10;
        ls = infl * 8;
      } else if (mode === 'magnetic') {
        /* 글자가 커서로 끌림 (가까울수록 강하게) */
        const pull = Math.min(1, 160 / dist);
        tx = dx * pull * 0.55;
        ty = dy * pull * 0.55 + breath * (1-pull);
        sx = sy = 1 + pull * 0.25;
      } else if (mode === 'scatter') {
        /* 커서가 글자를 밀어냄 (반발) */
        const R = 260;
        if (dist < R) {
          const force = (1 - dist / R);
          tx = -(dx / dist) * force * 150;
          ty = -(dy / dist) * force * 150 + breath;
          rot = force * (dx > 0 ? 24 : -24);
          sx = sy = 1 - force * 0.18;
        }
      } else if (mode === 'shadow') {
        /* 커서 위치로 긴 그림자 (::after 오프셋) */
        const ang = Math.atan2(c.hy - mouse.y, c.hx - mouse.x);
        const len = Math.min(28, dist / 22);
        shX = Math.cos(ang) * len; shY = Math.sin(ang) * len;
        ty = breath;
      }
    }

    /* 감쇠 보간으로 부드럽게 */
    c.ox += (tx - c.ox) * 0.14;
    c.oy += (ty - c.oy) * 0.14;
    c.rot += (rot - c.rot) * 0.14;
    c.scale += (((sx+sy)/2) - c.scale) * 0.14;

    c.el.style.transform =
      `translate(${c.ox.toFixed(2)}px, ${c.oy.toFixed(2)}px) rotate(${c.rot.toFixed(2)}deg) scale(${c.scale.toFixed(3)})`;
    c.el.style.letterSpacing = ls ? `${ls.toFixed(1)}px` : '';
    /* 웨이브/마그네틱 때 굵기·색 강조 + 오로라 글로우 (.hot = 그라디언트 글자) */
    if (mode === 'wave') {
      const infl = Math.max(0, 1 - dist / 340);
      c.el.style.fontWeight = 300 + Math.round(infl * 400);
      c.el.classList.toggle('hot', infl > 0.5);
      c.el.style.textShadow = infl > 0.15 ? auroraGlow(infl) : '';
    } else if (mode === 'magnetic') {
      const pull = Math.min(1, 160 / dist);
      c.el.classList.toggle('hot', pull > 0.6);
      c.el.style.fontWeight = 700;
      c.el.style.textShadow = pull > 0.2 ? auroraGlow(pull) : '';
    } else if (mode === 'shadow') {
      c.el.classList.remove('hot');
      c.el.style.fontWeight = 700;
      /* 커서 위치 기준 긴 오로라 그림자 (시안→보라) */
      c.el.style.textShadow = `${shX.toFixed(1)}px ${shY.toFixed(1)}px 0 rgba(0,234,255,.30),
        ${(shX*1.7).toFixed(1)}px ${(shY*1.7).toFixed(1)}px 0 rgba(176,107,255,.16)`;
    } else {
      c.el.classList.remove('hot');
      c.el.style.fontWeight = 700;
      c.el.style.textShadow = '';
    }
  });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
